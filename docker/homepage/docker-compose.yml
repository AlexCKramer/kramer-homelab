services:
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    env_file:
      - .env
    user: "1000:1000"
    group_add:
      - "996"
    # REMOVED the ports section to force traffic through Traefik
    environment:
      # ADDED the new custom domain to the allowed hosts list
      - HOMEPAGE_ALLOWED_HOSTS=192.168.42.42,192.168.42.42:3000,homepage.kramer.local
    volumes:
      - ./:/app/config 
      - /var/run/docker.sock:/var/run/docker.sock:ro 
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.homepage.rule=Host(`homepage.kramer.local`)"
      - "traefik.http.routers.homepage.entrypoints=web"
      - "traefik.http.services.homepage.loadbalancer.server.port=3000"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.homepage.middlewares=authentik@docker"
    restart: unless-stopped

networks:
  proxy:
    external: true
