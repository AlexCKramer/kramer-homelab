site_name: Unified Homelab Wiki
site_url: http://192.168.42.42:8000
site_author: Alex
use_directory_urls: true

theme:
  name: material
  palette:
    - scheme: slate
      primary: indigo
      accent: indigo
  features:
    - navigation.tabs
    - navigation.sections
    - search.suggest
    - search.highlight
    - content.code.copy

markdown_extensions:
  - pymdownx.tasklist:
      custom_checkbox: true

nav:
  - Home: index.md
  
  - 🎓 Portfolio:
      - Academic Labs & Projects: portfolio/academic-labs.md
      
  - 🗺️ Infrastructure & Network:
      - Topology & IP Management: network/topology.md
      - DNS & Routing: network/dns.md
      - Physical Nodes:
          - Command-Deck: nodes/command-deck.md
          - Mothership (Proxmox): nodes/mothership.md
          - Holodeck: nodes/holodeck.md
          - Escape-Pod: nodes/escape-pod.md
      - Virtualization:
          - Virtual Machines: services/vms.md
          - Docker Containers: services/containers.md
          
  - ⚙️ Operations & Runbooks:
      - SRE Health Monitor: operations/health-monitor.md
      - Ansible Automation: operations/ansible.md
      - Backup Strategy: operations/backups.md
      
  - 📋 SRE Management:
      - Task List (ToDos): todos/tasks.md
      - Incident Log: incidents/log.md
      - Active Known Issues: incidents/known-issues.md
      - DR Drill (VM666): incidents/dr-drill-vm666.md
extra_css:
  - stylesheets/custom.css
