---
- name: Baseline Security & Maintenance
  hosts: debian_vms
  become: yes

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install unattended-upgrades and UFW
      apt:
        name:
          - unattended-upgrades
          - ufw
        state: present

    - name: Ensure unattended-upgrades service is running
      service:
        name: unattended-upgrades
        state: started
        enabled: yes

    - name: Ensure SSH is always allowed (Anti-Lockout)
      ufw:
        rule: allow
        name: OpenSSH
    # --- PHASE 9 SECURITY AUDIT MITIGATIONS ---

    - name: Disable TCP Timestamps (Mitigate Information Disclosure)
      sysctl:
        name: net.ipv4.tcp_timestamps
        value: '0'
        state: present
        sysctl_set: yes
        reload: yes

    - name: Harden SSH MAC algorithms (Disable umac-64)
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?MACs '
        line: 'MACs hmac-sha2-512-etm@openssh.com,hmac-sha2-256-etm@openssh.com,hmac-sha2-512,hmac-sha2-256'
        state: present
        validate: /usr/sbin/sshd -t -f %s
      notify: restart ssh

  handlers:
    - name: restart ssh
      service:
        name: ssh
        state: restarted

    # SRE SAFETY HOLD: 
    # We are installing UFW, but we are intentionally NOT enabling it yet.
    # Enabling a default firewall right now would instantly sever Homepage's 
    # connection to your Docker proxies and block Palworld/7DTD from the internet!