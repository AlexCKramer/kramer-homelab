---
- name: Deploy Docker Engine and Docker Compose
  hosts: debian_vms
  become: yes

  tasks:
    - name: Download Docker convenience script
      get_url:
        url: https://get.docker.com
        dest: /tmp/get-docker.sh
        mode: '0700'

    - name: Execute Docker installation script
      command: sh /tmp/get-docker.sh
      args:
        # This prevents Ansible from running the script if Docker is already installed
        creates: /usr/bin/docker

    - name: Add standard user to the docker group
      user:
        name: alex
        groups: docker
        append: yes

    - name: Ensure Docker service is enabled on boot and running
      service:
        name: docker
        state: started
        enabled: yes